windowrule = float on, match:class ^org\.notarchy\.(bluetui|impala|wiremix)$
windowrule = center on, match:class ^org\.notarchy\.(bluetui|impala|wiremix)$
windowrule = size 875 600, match:class ^org\.notarchy\.(bluetui|impala|wiremix)$

windowrule = float on, center on, size 360 480, match:class ^org\.gnome\.Calculator$

windowrule = float on, center on, size 900 650, match:class ^org\.notarchy\.menu$, match:title ^NotArchy (Install|Remove)$

windowrule = fullscreen on, match:class ^org\.notarchy\.screensaver$
windowrule = float on, match:class ^org\.notarchy\.screensaver$
windowrule = animation slide, match:class ^org\.notarchy\.screensaver$
