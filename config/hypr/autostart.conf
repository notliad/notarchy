# Extra autostart processes
# exec-once = uwsm-app -- my-service
exec-once = bash -lc 'notarchy-onboarding --ensure-defaults; waybar'
exec-once = bash -lc '[[ -e "$HOME/.config/notarchy/onboarding-seen" ]] || uwsm-app -- ghostty --class=org.notarchy.onboarding --title="NotArchy Onboarding" -e notarchy-onboarding --first-run'
exec-once = mako
exec-once = hypridle
exec-once = uwsm-app -- elephant
exec-once = notarchy-wallpaper current
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Adwaita-dark
