# Application bindings adapted from mydotfiles without Omarchy wrappers.
$terminal = ghostty
$browser = notarchy-browser

bind = SUPER, SPACE, exec, notarchy-launch-walker
bind = SUPER ALT, SPACE, exec, notarchy-menu
bind = SUPER CTRL, SPACE, exec, notarchy-wallpaper next
bind = SUPER, ESCAPE, exec, notarchy-menu system
bind = SUPER, RETURN, exec, $terminal
bind = SUPER, W, killactive
bind = SUPER, S, togglespecialworkspace, scratchpad
bind = SUPER SHIFT, S, movetoworkspacesilent, special:scratchpad
bind = SUPER ALT, RETURN, exec, $terminal -e tmux new
bind = SUPER SHIFT, RETURN, exec, $browser --profile-directory="Default"
bind = SUPER SHIFT, E, exec, nautilus --new-window
bind = SUPER SHIFT, B, exec, $browser --profile-directory="Default"
bind = SUPER SHIFT, J, exec, $browser --profile-directory="Profile 1"
bind = SUPER SHIFT ALT, B, exec, $browser --incognito --profile-directory="Default"
bind = SUPER SHIFT, M, exec, $terminal -e mutui
bind = SUPER SHIFT, V, exec, code
bind = SUPER SHIFT, T, exec, $terminal -e btop
bind = SUPER SHIFT, D, exec, $terminal -e lazydocker
bind = SUPER SHIFT, G, exec, $terminal -e lazygit
bind = SUPER SHIFT, O, exec, obsidian -disable-gpu --enable-wayland-ime
bind = SUPER SHIFT, W, exec, typora --enable-wayland-ime
bind = SUPER SHIFT, SLASH, exec, 1password
bind = SUPER SHIFT, A, exec, $browser --app="https://chatgpt.com" --profile-directory="Default"
bind = SUPER SHIFT ALT, A, exec, $browser --app="https://grok.com"
bind = SUPER SHIFT, C, exec, cctv-viewer
bind = SUPER SHIFT, Y, exec, $browser --app="https://youtube.com/" --profile-directory="Default"
bind = SUPER SHIFT ALT, G, exec, $browser --app="https://web.whatsapp.com/" --profile-directory="Default"
bind = SUPER SHIFT CTRL, G, exec, $browser --app="https://messages.google.com/web/conversations"
bind = SUPER SHIFT, P, exec, $browser --app="https://photos.google.com/" --profile-directory="Default"
bind = SUPER SHIFT, X, exec, pkill hyprpicker || hyprpicker -a
bind = SUPER SHIFT, L, exec, hyprlock
bind = SUPER SHIFT, H, exec, $browser --app="http://192.168.1.19:7575/boards/Dashboard" --profile-directory="Default"

bind = , PRINT, exec, notarchy-capture-screenshot
bind = SUPER, PRINT, exec, notarchy-capture-ocr

bind = SUPER, F9, exec, pactl set-sink-port alsa_output.pci-0000_00_1f.3.analog-stereo analog-output-speaker; notify-send "Audio: Speakers"
bind = SUPER, F10, exec, pactl set-sink-port alsa_output.pci-0000_00_1f.3.analog-stereo analog-output-headphones; notify-send "Audio: Headphones"

bind = SUPER, LEFT, movefocus, l
bind = SUPER, RIGHT, movefocus, r
bind = SUPER, UP, movefocus, u
bind = SUPER, DOWN, movefocus, d

bind = SUPER SHIFT, LEFT, swapwindow, l
bind = SUPER SHIFT, RIGHT, swapwindow, r
bind = SUPER SHIFT, UP, swapwindow, u
bind = SUPER SHIFT, DOWN, swapwindow, d

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, code:10, workspace, 1
bind = SUPER, code:11, workspace, 2
bind = SUPER, code:12, workspace, 3
bind = SUPER, code:13, workspace, 4
bind = SUPER, code:14, workspace, 5
bind = SUPER, code:15, workspace, 6
bind = SUPER, code:16, workspace, 7
bind = SUPER, code:17, workspace, 8
bind = SUPER, code:18, workspace, 9
bind = SUPER, code:19, workspace, 10

bind = SUPER SHIFT, code:10, movetoworkspace, 1
bind = SUPER SHIFT, code:11, movetoworkspace, 2
bind = SUPER SHIFT, code:12, movetoworkspace, 3
bind = SUPER SHIFT, code:13, movetoworkspace, 4
bind = SUPER SHIFT, code:14, movetoworkspace, 5
bind = SUPER SHIFT, code:15, movetoworkspace, 6
bind = SUPER SHIFT, code:16, movetoworkspace, 7
bind = SUPER SHIFT, code:17, movetoworkspace, 8
bind = SUPER SHIFT, code:18, movetoworkspace, 9
bind = SUPER SHIFT, code:19, movetoworkspace, 10

bind = SUPER SHIFT ALT, code:10, movetoworkspacesilent, 1
bind = SUPER SHIFT ALT, code:11, movetoworkspacesilent, 2
bind = SUPER SHIFT ALT, code:12, movetoworkspacesilent, 3
bind = SUPER SHIFT ALT, code:13, movetoworkspacesilent, 4
bind = SUPER SHIFT ALT, code:14, movetoworkspacesilent, 5
bind = SUPER SHIFT ALT, code:15, movetoworkspacesilent, 6
bind = SUPER SHIFT ALT, code:16, movetoworkspacesilent, 7
bind = SUPER SHIFT ALT, code:17, movetoworkspacesilent, 8
bind = SUPER SHIFT ALT, code:18, movetoworkspacesilent, 9
bind = SUPER SHIFT ALT, code:19, movetoworkspacesilent, 10
